- id: biome-008
  status: active
  severity: warning
  category: biome
  title: "Non-null assertion on value narrowed in a prior chained call"
  confidence: 0.85
  category_weight: 0.8
  pattern: |
    array.filter(r => r.field != null).map(r => r.field!.method())
    TypeScript does not propagate the null-narrowing across separate chained calls.
    The ! suppresses a real type error. Same applies to Promise.all(...).filter().
  why: |
    Biome noNonNullAssertion flags this. More importantly, if the filter predicate
    and the map expression ever diverge (e.g. during a refactor), the assertion
    becomes genuinely unsafe and will throw at runtime.
  fix: |
    Use reduce instead of filter+map, or inline the guard in the map body:
    array.reduce((acc, r) => {
      if (r.field != null) acc.push(r.field.method());
      return acc;
    }, []);
  example_bad: |
    const turnarounds = cRows.filter(r => r.reviewedAt != null)
      .map(r => r.reviewedAt!.getTime() - r.createdAt.getTime());
  example_good: |
    const turnarounds = cRows.reduce<number[]>((acc, r) => {
      if (r.reviewedAt != null) acc.push(r.reviewedAt.getTime() - r.createdAt.getTime());
      return acc;
    }, []);
  first_seen:
    file: "backend/src/contexts/analytics/services/qualityAnalytics.service.ts"
    line: 153
    date: "2026-03-14"
  last_triggered: "2026-03-14"
  trigger_count: 1
  merge_candidates: []
  conflicts_with: []
  regulatory_ref: null
  archived_date: null

- id: drizzle-013
  status: active
  severity: warning
  category: drizzle
  title: "locations table missing ENABLE ROW LEVEL SECURITY"
  confidence: 0.88
  category_weight: 2.0
  pattern: |
    The `locations` table in 0000_baseline.sql has no ENABLE ROW LEVEL SECURITY
    and no SELECT/INSERT/UPDATE policies. Per CLAUDE.md rule 1.5 every user-data
    table requires RLS.
  why: |
    The locations table holds tenant-identifying data (hospice branch records).
    Without RLS a compromised or misconfigured DB session could read all locations
    across tenants. Even reference tables should have at minimum a read policy.
  fix: |
    Add a migration that adds ENABLE ROW LEVEL SECURITY to locations plus a
    permissive SELECT policy (all authenticated users can read locations).
    INSERT/UPDATE should be restricted to ADMIN role.
  first_seen:
    file: "backend/database/migrations/drizzle/0000_baseline.sql"
    line: 1
    date: "2026-03-14"
  last_triggered: "2026-03-14"
