# Valkey 8.0 Configuration
# Production-ready configuration with persistence

port 6379
cluster-enabled no
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory-policy allkeys-lru

# Load RedisJSON module (if available)
# loadmodule /usr/lib/valkey/modules/redisjson.so
# loadmodule /usr/lib/valkey/modules/redisearch.so

# Logging
loglevel notice

# Security (set via environment variable in production)
# requirepass ${VALKEY_PASSWORD}
