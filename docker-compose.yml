services:
  postgres:
    image: postgres:18
    container_name: hospici-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospici
      POSTGRES_PASSWORD: hospici_dev
      POSTGRES_DB: hospici_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./backend/docker/setup-database.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospici -d hospici_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: postgres:18
    container_name: hospici-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: hospici
      POSTGRES_PASSWORD: hospici_dev
      POSTGRES_DB: hospici_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospici -d hospici_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8.0
    container_name: hospici-valkey
    restart: unless-stopped
    command: valkey-server /etc/valkey/valkey.conf
    volumes:
      - ./backend/docker/valkey/valkey.conf:/etc/valkey/valkey.conf
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "hospici_dev_valkey", "--no-auth-warning", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hospici-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  pg_data:
  valkey_data:
