  archived_date: null

- id: biome-006
  status: active
  severity: warning
  category: biome
  title: "console.log/error in seed scripts — Biome noConsole violation"
  confidence: 0.88
  category_weight: 0.8
  pattern: |
    console.log / console.error in backend/src/seeds/*.ts files.
    Biome noConsole is set to 'error' in biome.json — these fail the Biome gate.
  why: |
    Seed scripts run in CI and dev. console.error("Seed error:", err) can serialize
    DB error objects that may contain connection strings or query context.
    Biome will block CI on these files.
  fix: |
    Replace console.* with process.stdout.write() for seed scripts, or import the
    pino logger. Either satisfies Biome's noConsole rule.
  example_bad: |
    console.log(`Seeded template: ${tmpl.discipline}`)
    console.error("Seed error:", err)
  example_good: |
    process.stdout.write(`Seeded template: ${tmpl.discipline}\n`)
    process.stderr.write(`Seed error: ${err instanceof Error ? err.message : String(err)}\n`)
  first_seen:
    file: "backend/src/seeds/checklist-templates-seed.ts"
    line: 107
    date: "2025-03-14"
  last_triggered: "2026-03-14"
