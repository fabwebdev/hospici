- id: drizzle-012
  status: active
  severity: critical
  category: drizzle
  title: "N+1 queries: per-row DB calls inside Promise.all on list results"
  confidence: 0.93
  category_weight: 2.0
  pattern: |
    rows.map(async (row) => { await db.select()...where(eq(table.id, row.foreignId)) })
    called inside Promise.all. Fires N individual DB round-trips for a list of N rows.
    Found in: noteReview listQueue (patient name), teamComm listThreads (per-thread agg),
    qapi listEvents (action items + reporter name per event).
  why: |
    Review queue can easily have 50+ encounters. 50 individual patient-decrypt calls
    = 50 pgcrypto operations serially (they share a DB connection pool). Under load
    this saturates the pool and adds hundreds of milliseconds of latency to a
    clinical user's dashboard load.
  fix: |
    Batch the foreign-key lookup: collect unique IDs, run one WHERE id = ANY($1) query,
    build a Map, then map rows synchronously.
    For grouped aggregates (teamComm), use GROUP BY in a single query.
    For DISTINCT last-row-per-group (last message body), use DISTINCT ON in one query.
  example_bad: |
    const items = await Promise.all(
      rows.map(async (r) => {
        const name = await getPatientDisplayName(r.patientId);  // N DB calls
        return buildRow(r, name);
      })
    );
  example_good: |
    const ids = [...new Set(rows.map(r => r.patientId))];
    const patients = await db.select().from(patients).where(inArray(patients.id, ids));
    const nameMap = new Map(patients.map(p => [p.id, resolveName(p)]));
    const items = rows.map(r => buildRow(r, nameMap.get(r.patientId) ?? '[unknown]'));
  first_seen:
    file: "backend/src/contexts/clinical/services/noteReview.service.ts"
    line: 242
    date: "2026-03-14"
  last_triggered: "2026-03-14"
  trigger_count: 1
  merge_candidates: []
  conflicts_with: []
  regulatory_ref: null
  archived_date: null

- id: biome-007
  status: active
  severity: warning
  category: biome
  title: "Static-only class should be module-level functions"
  confidence: 0.90
  category_weight: 0.8
  pattern: |
    export class Foo { static async method1() {...} static async method2() {...} }
    with no constructor, no instance properties, and no instance methods.
    Biome noStaticOnlyClass fires on this pattern.
  why: |
    Static-only classes are a namespace anti-pattern in TypeScript. They prevent
    tree-shaking, add unnecessary indirection, and Biome treats them as an error.
    Module-level functions are the idiomatic replacement.
  fix: |
    Convert to exported module-level functions. If callers use the class-name syntax
    (Foo.method()), add a namespace object export:
    export const Foo = { method1, method2 };
  example_bad: |
    export class QualityAnalyticsService {
      static async getClinicianScorecards(...) {...}
    }
  example_good: |
    export async function getClinicianScorecards(...) {...}
    export const QualityAnalyticsService = { getClinicianScorecards, ... };
  first_seen:
    file: "backend/src/contexts/analytics/services/qualityAnalytics.service.ts"
    line: 74
    date: "2026-03-14"
  last_triggered: "2026-03-14"
  trigger_count: 1
  merge_candidates: []
  conflicts_with: []
  regulatory_ref: null
